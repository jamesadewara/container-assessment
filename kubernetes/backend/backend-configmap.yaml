apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: muchtodo
data:
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_URI: "mongodb://root:example@mongodb:27017/much_todo_db?authSource=admin&replicaSet=rs0"
  DB_NAME: "much_todo_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_ADDR: "redis:6379"
  PORT: "8080"